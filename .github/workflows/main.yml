name: Automated Preprocessing Workflow

on:
  push:
    branches: [ main ] 
  workflow_dispatch:   

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12.7'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools
        pip install pandas numpy scikit-learn

    - name: Run Preprocessing Script
      run: |
        python preprocessing/automate_Wahyudi-Putra.py  

    - name: Commit and Push Processed Data
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add preprocessing/processed_dataset.csv
        git commit -m "Update processed dataset [skip ci]" || echo "No changes to commit"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}